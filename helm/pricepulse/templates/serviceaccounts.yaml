apiVersion: v1
kind: ServiceAccount
metadata:
  name: pricepulse-workload-sa
  labels:
    {{- include "pricepulse.labels" . | nindent 4 }}
  annotations:
    # Workload Identity : lie le ServiceAccount K8s au compte GCP
    # Zéro clé JSON — l'authentification est gérée par GKE
    iam.gke.io/gcp-service-account: {{ .Values.gcp.serviceAccountEmail }}
