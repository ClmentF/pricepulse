apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-normalisation
  labels:
    {{- include "pricepulse.labels" . | nindent 4 }}
    app: consumer-normalisation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer-normalisation
  template:
    metadata:
      labels:
        app: consumer-normalisation
    spec:
      containers:
        - name: consumer-normalisation
          image: {{ .Values.consumers.normalisation.image.repository }}:{{ .Values.consumers.normalisation.image.tag }}
          env:
            - name: KAFKA_BOOTSTRAP
              value: {{ include "pricepulse.kafkaBootstrap" . }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
