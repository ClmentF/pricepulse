apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  labels:
    {{- include "pricepulse.labels" . | nindent 4 }}
    app: fastapi
spec:
  replicas: {{ .Values.fastapi.replicas }}
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      serviceAccountName: pricepulse-workload-sa
      containers:
        - name: fastapi
          image: {{ .Values.fastapi.image.repository }}:{{ .Values.fastapi.image.tag }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: pricepulse-secrets
          env:
            - name: KAFKA_BOOTSTRAP
              value: {{ include "pricepulse.kafkaBootstrap" . }}
            - name: REDIS_URL
              value: redis://redis:6379
            - name: BIGQUERY_PROJECT
              value: {{ .Values.gcp.project }}
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
