{{- if .Values.fastapi.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  labels:
    {{- include "pricepulse.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi
  minReplicas: {{ .Values.fastapi.hpa.minReplicas }}
  maxReplicas: {{ .Values.fastapi.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.fastapi.hpa.targetCPUUtilizationPercentage }}
{{- end }}
